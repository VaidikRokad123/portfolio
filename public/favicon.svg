<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818cf8" />
      <stop offset="100%" stop-color="#c084fc" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="24" fill="#08061c" />
  <rect x="2" y="2" width="96" height="96" rx="22" fill="none" stroke="url(#g)" stroke-width="4" opacity="0.6"/>
  
  <!-- Interconnected custom V and R monogram -->
  <!-- V's right stroke slants up and transitions directly into R's vertical stem -->
  <path d="M 22,30 L 40,70 L 52,30 C 68,30 74,47 52,50 L 70,70" 
        fill="none" 
        stroke="url(#g)" 
        stroke-width="9" 
        stroke-linecap="round" 
        stroke-linejoin="round" />
  <!-- Bottom stem extension of R to ground the character -->
  <line x1="52" y1="50" x2="52" y2="70" stroke="url(#g)" stroke-width="9" stroke-linecap="round" />
</svg>
